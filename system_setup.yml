---
- name: Install Docker and utilities on Debian
  hosts: localhost
  connection: local
  become: true

  vars:
    docker_packages:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    docker_users: []  # Add usernames here to grant Docker access, e.g. ["alice", "bob"]
    prereq_packages:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
      
    utility_packages:
      - tmux
      - htop
      - vim
      - tree

  tasks:

    # ── Prerequisites ──────────────────────────────────────────────────────────

    - name: Update apt cache
      apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install prerequisite packages
      apt:
        name: "{{ prereq_packages }}"
        state: present

    # ── Docker APT repository ──────────────────────────────────────────────────

    - name: Create /etc/apt/keyrings directory
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker APT repository
      apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/debian
          {{ ansible_lsb.codename }} stable
        state: present
        filename: docker

    # ── Install Docker ─────────────────────────────────────────────────────────

    - name: Update apt cache after adding Docker repo
      apt:
        update_cache: true

    - name: Install Docker CE and related packages
      apt:
        name: "{{ docker_packages }}"
        state: present

    # ── Service ────────────────────────────────────────────────────────────────

    - name: Enable and start Docker service
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Enable and start containerd service
      systemd:
        name: containerd
        enabled: true
        state: started

    # ── Optional: add users to docker group ───────────────────────────────────

    - name: Add users to docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: true
      loop: "{{ docker_users }}"
      when: docker_users | length > 0

    # ── Utilities ──────────────────────────────────────────────────────────────

    - name: Install utility packages
      apt:
        name: "{{ utility_packages }}"
        state: present

    # ── Smoke test ─────────────────────────────────────────────────────────────

    - name: Run hello-world container to verify Docker works
      command: docker run --rm hello-world
      register: docker_hello
      changed_when: false

    - name: Show hello-world output
      debug:
        msg: "{{ docker_hello.stdout_lines }}"
