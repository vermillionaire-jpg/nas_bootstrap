services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
#    user: 1000:1000
    ports:
      - 8096:8096/tcp
      - 7359:7359/udp
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ~/docker/jellyfin/config:/config
      - ~/docker/jellyfin/cache:/cache
      - type: bind
        source: /home/$USER/trans/downloads/complete
        target: /media
    devices:
      - /dev/dri:/dev/dri
    restart: 'unless-stopped'
    extra_hosts:
      - 'host.docker.internal:host-gateway'