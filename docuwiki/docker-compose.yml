services:
  dokuwiki:
    image: lscr.io/linuxserver/dokuwiki:latest
    container_name: dokuwiki
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=America/New_York
    volumes:
      - ~/docker/docuwiki/data/config:/config
    ports:
      - "8080:80"
      - "8443:443"
    restart: unless-stopped